[package]
name = "vote"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]


[lints]
workspace = true

[dependencies]
mududb = { workspace = true, features = ["async"] }
wit-bindgen = { workspace = true }
uuid = { workspace = true }
lazy_static = { workspace = true }
chrono = { workspace = true }
