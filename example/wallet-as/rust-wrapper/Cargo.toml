[package]
name = "wallet-as-wrapper"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace]

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(fuzzing)'] }

[workspace.lints.clippy]
disallowed-types = "deny"

[lib]
crate-type = ["cdylib"]

[lints]
workspace = true

[dependencies]
mududb = { path = "../../../mududb", default-features = false, features = ["app"] }
wit-bindgen = "0.54.0"
