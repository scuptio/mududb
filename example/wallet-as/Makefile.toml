[env]
PACKAGE_NAME = "wallet-as"
MODULE_NAME = "wallet_as"
TARGET = "wasm32-wasip2"
PROFILE = "release"
WASM_FILE = "${CARGO_MAKE_WORKING_DIRECTORY}/../../target/${TARGET}/${PROFILE}/${MODULE_NAME}.wasm"
PACKAGE_TARGET = "${CARGO_MAKE_WORKING_DIRECTORY}/../../target/${TARGET}/${PROFILE}/${PACKAGE_NAME}.mpk"
AS_CORE_WASM = "${CARGO_MAKE_WORKING_DIRECTORY}/build/as/procedures.core.wasm"
AS_EMBEDDED_WASM = "${CARGO_MAKE_WORKING_DIRECTORY}/build/as/procedures.embedded.wasm"
AS_COMPONENT_WASM = "${CARGO_MAKE_WORKING_DIRECTORY}/build/as/procedures-component.wasm"
WRAPPER_WASM = "${CARGO_MAKE_WORKING_DIRECTORY}/rust-wrapper/target/wasm32-wasip2/release/wallet_as_wrapper.wasm"
RS_SHIM_WASM = "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/rs-shim/target/wasm32-wasip2/release/mududb-rs-shim.wasm"
WRAPPER_PROCEDURES_WASM = "${CARGO_MAKE_WORKING_DIRECTORY}/build/wallet_as_procedures.wasm"

[tasks.prepare]
command = "mkdir"
args = [
    "-p",
    "${CARGO_MAKE_WORKING_DIRECTORY}/generated",
    "${CARGO_MAKE_WORKING_DIRECTORY}/build/as"
]

[tasks.transpile]
dependencies = ["prepare"]
command = "cargo"
args = [
    "run", "--quiet",
    "--manifest-path", "${CARGO_MAKE_WORKING_DIRECTORY}/../../mudu_transpiler/Cargo.toml",
    "--bin", "mtp",
    "--",
    "--input", "${CARGO_MAKE_WORKING_DIRECTORY}/assembly/procedures.ts",
    "--output", "${CARGO_MAKE_WORKING_DIRECTORY}/generated/procedures.gen.ts",
    "--module", "${MODULE_NAME}",
    "--package-desc", "${CARGO_MAKE_WORKING_DIRECTORY}/package/package.desc.json",
    "assembly-script"
]

[tasks.patch-generated-imports]
dependencies = ["transpile"]
command = "python3"
args = ["${CARGO_MAKE_WORKING_DIRECTORY}/scripts/patch-generated-imports.py"]

[tasks.link-binding-scope]
dependencies = ["prepare"]
command = "mkdir"
args = ["-p", "${CARGO_MAKE_WORKING_DIRECTORY}/node_modules/@mududb"]

[tasks.link-binding]
dependencies = ["link-binding-scope"]
command = "ln"
args = [
    "-sfn",
    "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/assemblyscript",
    "${CARGO_MAKE_WORKING_DIRECTORY}/node_modules/@mududb/assemblyscript-binding"
]

[tasks.link-binding-entry]
dependencies = ["link-binding"]
command = "ln"
args = [
    "-sfn",
    "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/assemblyscript/assembly/index.ts",
    "${CARGO_MAKE_WORKING_DIRECTORY}/node_modules/@mududb/assemblyscript-binding.ts"
]

[tasks.npm-install]
command = "npm"
args = [
    "install",
    "--prefix", "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/assemblyscript"
]

[tasks.asc-build]
dependencies = ["patch-generated-imports", "link-binding-entry", "npm-install"]
command = "../../bindings/assemblyscript/node_modules/.bin/asc"
args = [
    "${CARGO_MAKE_WORKING_DIRECTORY}/generated/procedures.gen.ts",
    "--outFile", "${AS_CORE_WASM}",
    "--textFile", "${CARGO_MAKE_WORKING_DIRECTORY}/build/as/procedures.core.wat",
    "--path", "${CARGO_MAKE_WORKING_DIRECTORY}/node_modules",
    "--optimizeLevel", "3",
    "--shrinkLevel", "0",
    "--exportRuntime",
    "--exportStart", "_initialize"
]

[tasks.patch-component-exports]
dependencies = ["asc-build"]
command = "python3"
args = ["${CARGO_MAKE_WORKING_DIRECTORY}/scripts/patch-component-exports.py"]

[tasks.as-componentize]
dependencies = ["patch-component-exports"]
command = "wasm-tools"
args = [
    "component", "embed",
    "--world", "procedure-api",
    "--dummy-names", "legacy",
    "${CARGO_MAKE_WORKING_DIRECTORY}/wit",
    "${CARGO_MAKE_WORKING_DIRECTORY}/build/as/procedures.core.patched.wasm",
    "--output", "${AS_EMBEDDED_WASM}"
]

[tasks.as-component]
dependencies = ["as-componentize"]
command = "wasm-tools"
args = [
    "component", "new",
    "${AS_EMBEDDED_WASM}",
    "--output", "${AS_COMPONENT_WASM}"
]

[tasks.rust-wrapper-build]
dependencies = ["patch-generated-imports"]
command = "cargo"
args = [
    "build",
    "--manifest-path", "${CARGO_MAKE_WORKING_DIRECTORY}/rust-wrapper/Cargo.toml",
    "--target", "wasm32-wasip2",
    "--release"
]

[tasks.rs-shim-build]
command = "cargo"
args = [
    "build",
    "--manifest-path", "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/rs-shim/Cargo.toml",
    "--target", "wasm32-wasip2",
    "--release"
]

[tasks.rs-shim-copy]
dependencies = ["rs-shim-build"]
command = "cp"
args = [
    "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/rs-shim/target/wasm32-wasip2/release/mududb_rs_shim.wasm",
    "${CARGO_MAKE_WORKING_DIRECTORY}/../../bindings/rs-shim/target/wasm32-wasip2/release/mududb-rs-shim.wasm"
]

[tasks.compose]
dependencies = ["as-component", "rust-wrapper-build", "rs-shim-copy"]
script_runner = "@shell"
script = '''
wasm-tools compose "${WRAPPER_WASM}" -d "${AS_COMPONENT_WASM}" --output "${WRAPPER_PROCEDURES_WASM}"
wasm-tools compose "${WRAPPER_PROCEDURES_WASM}" -d "${RS_SHIM_WASM}" --output "${WASM_FILE}"
'''

[tasks.validate-component]
dependencies = ["compose"]
command = "wasm-tools"
args = ["validate", "${WASM_FILE}"]

[tasks.package]
dependencies = ["validate-component"]
command = "cargo"
args = [
    "run", "--quiet",
    "--manifest-path", "${CARGO_MAKE_WORKING_DIRECTORY}/../../mpm_build/Cargo.toml",
    "--bin", "mpm-build",
    "--",
    "create",
    "--package-cfg", "${CARGO_MAKE_WORKING_DIRECTORY}/package/package.cfg.json",
    "--package-desc", "${CARGO_MAKE_WORKING_DIRECTORY}/package/package.desc.json",
    "--ddl-sql", "${CARGO_MAKE_WORKING_DIRECTORY}/sql/ddl.sql",
    "--initdb-sql", "${CARGO_MAKE_WORKING_DIRECTORY}/sql/init.sql",
    "--wasm-files", "${WASM_FILE}",
    "--output", "${PACKAGE_TARGET}"
]

[tasks.package-placeholder]
dependencies = ["transpile"]
command = "cargo"
args = [
    "run", "--quiet",
    "--manifest-path", "${CARGO_MAKE_WORKING_DIRECTORY}/../../mpm_build/Cargo.toml",
    "--bin", "mpm-build",
    "--",
    "create",
    "--package-cfg", "${CARGO_MAKE_WORKING_DIRECTORY}/package/package.cfg.json",
    "--package-desc", "${CARGO_MAKE_WORKING_DIRECTORY}/package/package.desc.json",
    "--ddl-sql", "${CARGO_MAKE_WORKING_DIRECTORY}/sql/ddl.sql",
    "--initdb-sql", "${CARGO_MAKE_WORKING_DIRECTORY}/sql/init.sql",
    "--wasm-files", "${WASM_FILE}",
    "--output", "${PACKAGE_TARGET}"
]

[tasks.default]
alias = "package"
