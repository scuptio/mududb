name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
      - '.github/run-actions-locally.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
      - '.github/run-actions-locally.md'
  workflow_dispatch:
    inputs:
      clean_cargo:
        description: 'Run cargo clean before build'
        required: false
        type: boolean
        default: false
      release_test:
        description: 'Run tests in release mode'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      ENABLE_CARGO_CLEAN: ${{ github.event.inputs.clean_cargo || 'true' }}
      ENABLE_RELEASE_TEST: ${{ github.event.inputs.release_test || 'true' }}
      CARGO_INCREMENTAL: 0
      CARGO_BUILD_JOBS: 2
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
      MUDU_TEST_BACKEND_READY_TIMEOUT_SECS: 120
      MUDU_CLI_HTTP_TIMEOUT_SECS: 120
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup pinned stable Rust
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/rust-stable-setup

      - name: Free disk space
        if: matrix.os == 'ubuntu-latest'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          docker system prune -af || true
          df -h

      - name: Cache Cargo Registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable

      - name: Clean cargo cache (optional)
        if: env.ENABLE_CARGO_CLEAN == 'true'
        run: |
          mkdir -p logs
          set -o pipefail
          cargo clean 2>&1 | tee logs/build-clean.log

      - name: Check (debug)
        if: env.ENABLE_RELEASE_TEST != 'true'
        run: |
          mkdir -p logs
          set -o pipefail
          cargo check 2>&1 | tee logs/build-check-debug.log

      - name: Check (release)
        if: env.ENABLE_RELEASE_TEST == 'true'
        run: |
          mkdir -p logs
          set -o pipefail
          cargo check --release 2>&1 | tee logs/build-check-release.log

      - name: Clippy
        run: |
          mkdir -p logs
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee logs/build-clippy.log

      - name: Verify Install Script (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p logs
          set -o pipefail
          python3 script/build/install_binaries.py --dry-run 2>&1 | tee logs/build-verify-install.log

      - name: Inspect io_uring Environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p logs
          set -o pipefail
          bash script/build/inspect_iouring_env.sh 2>&1 | tee logs/build-inspect-iouring.log

      - name: Test (debug)
        if: env.ENABLE_RELEASE_TEST != 'true'
        run: |
          mkdir -p logs
          set -o pipefail
          cargo test -- --test-threads=1 2>&1 | tee logs/build-test-debug.log

      - name: Test (release)
        if: env.ENABLE_RELEASE_TEST == 'true'
        run: |
          mkdir -p logs
          set -o pipefail
          cargo test --release -- --test-threads=1 2>&1 | tee logs/build-test-release.log

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup pinned stable Rust
        uses: ./.github/actions/rust-stable-setup

      - name: Cache Cargo Registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc

      - name: Generate documentation
        run: cargo doc --workspace --no-deps
