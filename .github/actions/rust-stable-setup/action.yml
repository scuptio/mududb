name: Rust Stable Setup

description: Install Linux prerequisites and the stable toolchain pinned by rust-toolchain.toml

runs:
  using: composite
  steps:
    - name: Install prerequisites (Linux)
      shell: bash
      run: |
        if command -v sudo >/dev/null 2>&1; then
          sudo apt-get update -y
          sudo apt-get install -y python3 pip build-essential curl liburing-dev clang libclang-dev llvm-dev
        else
          apt-get update -y
          apt-get install -y python3 pip build-essential curl liburing-dev clang libclang-dev llvm-dev
        fi

    - name: Install rustup
      shell: bash
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
        fi
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Install pinned stable toolchain
      shell: bash
      run: |
        STABLE_TOOLCHAIN="$(python3 -c 'import tomllib; print(tomllib.load(open("rust-toolchain.toml", "rb"))["toolchain"]["channel"])')"
        rustup toolchain install "$STABLE_TOOLCHAIN" --profile minimal --component clippy,rustfmt --target x86_64-unknown-linux-gnu,wasm32-wasip2
        rustup show active-toolchain
        rustc --version --verbose
        cargo --version
