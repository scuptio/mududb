name: Rust Nightly Tooling Setup

description: Install the pinned nightly toolchain used only by udeps, fuzz, Miri, and sanitizers

runs:
  using: composite
  steps:
    - name: Install prerequisites (Linux)
      shell: bash
      run: |
        if command -v sudo >/dev/null 2>&1; then
          sudo apt-get update -y
          sudo apt-get install -y python3 pip build-essential curl liburing-dev clang libclang-dev llvm-dev
        else
          apt-get update -y
          apt-get install -y python3 pip build-essential curl liburing-dev clang libclang-dev llvm-dev
        fi

    - name: Install rustup
      shell: bash
      run: |
        if ! command -v rustup >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
        fi
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Install pinned nightly toolchain
      shell: bash
      run: |
        NIGHTLY_TOOLCHAIN="$(tr -d '[:space:]' < .rust-nightly-version)"
        case "$NIGHTLY_TOOLCHAIN" in
          nightly-????-??-??) ;;
          *) echo "invalid pinned nightly: $NIGHTLY_TOOLCHAIN" >&2; exit 1 ;;
        esac
        rustup toolchain install "$NIGHTLY_TOOLCHAIN" --profile minimal
        rustup component add rustfmt --toolchain "$NIGHTLY_TOOLCHAIN"
        rustup target add x86_64-unknown-linux-gnu --toolchain "$NIGHTLY_TOOLCHAIN"
        echo "NIGHTLY_TOOLCHAIN=$NIGHTLY_TOOLCHAIN" >> "$GITHUB_ENV"
        cargo "+$NIGHTLY_TOOLCHAIN" --version
