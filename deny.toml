[sources]
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/scuptio/rliburing.git"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "bzip2-1.0.6",
    "BSL-1.0",
]

[[licenses.clarify]]
name = "rliburing"
expression = "MIT"
license-files = []

[advisories]
# Use the default RustSec advisory database.
ignore = [
    # rustls-webpki 0.102 is pulled in by libsql -> hyper-rustls; upgrading libsql is a larger task.
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki pinned via libsql, upgrade pending" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki pinned via libsql, upgrade pending" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki pinned via libsql, upgrade pending" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki pinned via libsql, upgrade pending" },
    # Other transitive advisories that require upstream upgrades.
    { id = "RUSTSEC-2024-0436", reason = "transitive dependency; upgrade pending" },
    { id = "RUSTSEC-2025-0134", reason = "transitive dependency; upgrade pending" },
    { id = "RUSTSEC-2025-0141", reason = "transitive dependency; upgrade pending" },
]
