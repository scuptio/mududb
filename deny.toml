# Dependency graph enforcement:
# mudu_sys_impl is the only crate allowed to use non-deterministic sources
# (tokio, std::thread, std::sync, io_uring, etc.).
# It must only be depended upon by mudu_sys.
[bans]
deny = [
    { name = "mudu_sys_impl", wrappers = ["mudu_sys"] },
]

# Several large transitive dependencies pull in conflicting major versions of
# common crates (tonic, axum, hyper, hashbrown, etc.). Since these duplicates
# come from upstream dependency trees that cannot be unified without upgrading
# or replacing those crates, suppress duplicate warnings within those subtrees.
skip-tree = [
    { name = "libsql", depth = 10 },
    { name = "libsql_replication", depth = 10 },
    { name = "console-subscriber", depth = 10 },
    { name = "zip", depth = 10 },
    { name = "wasmtime", depth = 10 },
    { name = "reqwest", depth = 10 },
    { name = "mysql", depth = 10 },
    { name = "mysql_async", depth = 10 },
    { name = "pgwire", depth = 10 },
]

# Remaining duplicates that are not covered by the skip-tree entries above.
skip = [
    { name = "base64", version = "0.21.7" },
    { name = "base64", version = "0.22.1" },
    { name = "bindgen", version = "0.66.1" },
